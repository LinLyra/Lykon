sampling:
  imu_hz: 100
  uwb_hz: 20

windows:
  short:
    size: 50
    step: 25
  long:
    size: 100
    step: 50

thresholds:
  idle:
    acc_std_max: 0.20
    acc_range_max: 0.60
    uwb_vel_max: 0.30

  dribble:
    acc_std_min: 0.25
    peak_count_min_short: 1
    peak_count_max_short: 3
    dominant_freq_min: 1.0
    dominant_freq_max: 5.5
    arm_symmetry_max: 0.40

  shot:
    acc_max_min: 1.8
    acc_range_min: 0.8
    arm_symmetry_max: 0.45
    follow_through_std_max: 0.30

  pass:
    acc_max_min: 2.0
    peak_count_min: 1
    peak_count_max: 3
    arm_symmetry_min: 0.65
    duration_max_ms: 800

  jump:
    acc_max_min: 3.0
    acc_range_min: 1.5
    microgravity_max: 0.6

  sprint:
    acc_std_min: 0.45
    dominant_freq_min: 1.8
    uwb_vel_min: 4.5

  collision:
    acc_max_min: 4.5
    peak_count_max: 2
    duration_max_ms: 300

  layup:
    uwb_vel_min: 2.5
    acc_max_min: 2.2
    near_rim_required: false

  rebound:
    acc_max_min: 3.0
    jump_required: true
    catch_after_jump_ms: 800

priority:
  - collision
  - jump
  - shot
  - pass
  - dribble
  - sprint
  - idle